version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # AGP 8.5.2 is not compatible with Gradle 9.x — the bundled Kotlin
      # breaks Lint's type resolution (false-positive RememberReturnType
      # errors). Stay on Gradle 8 until AGP/Kotlin are upgraded together.
      - dependency-name: "gradle-wrapper"
        update-types: ["version-update:semver-major"]
    groups:
      androidx:
        patterns:
          - "androidx.*"
      compose:
        patterns:
          - "androidx.compose.*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
