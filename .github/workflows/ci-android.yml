# Android CI: lint, unit tests, debug APK, release AAB, signing, auto-release.
#
# Triggers and behavior:
#   - PR to main                         -> lint + tests + debug APK + release AAB (no release)
#   - push to main (PR merge)            -> above + auto-bump patch version, tag, GitHub Release
#   - push tag v*                        -> above + use the tag's version verbatim, GitHub Release
#   - workflow_dispatch                  -> build only (no release)
#
# Docs-only changes (markdown, LICENSE, .gitignore) are skipped via paths-ignore.
# To skip the auto-release on a main push, include "[skip release]" anywhere
# in the commit message.

name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full tag history to compute the next patch version.
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          set -e
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            SHOULD_RELEASE=true
            echo "Tag push: version=$VERSION"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            LATEST=$(git tag -l 'v*.*.*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.1.0"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
              VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
            if git log -1 --pretty=%B | grep -qF '[skip release]'; then
              SHOULD_RELEASE=false
              echo "Main push: version=$VERSION (release skipped via [skip release])"
            else
              SHOULD_RELEASE=true
              echo "Main push: version=$VERSION (will release)"
            fi
          else
            # PRs, feature branches, dispatch -- build only, no release.
            BASE_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -1)
            BASE="${BASE_TAG#v}"
            BASE="${BASE:-0.0.0}"
            VERSION="${BASE}-pr.${GITHUB_RUN_NUMBER}"
            SHOULD_RELEASE=false
            echo "Non-release context: version=$VERSION"
          fi
          # versionCode = MAJOR*10000 + MINOR*100 + PATCH (caps at 99 each).
          # AGP rejects versionCode < 1, so floor at 1 for pre-tag PR builds.
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION%%-*}"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          [ "$VERSION_CODE" -lt 1 ] && VERSION_CODE=1
          echo "version_name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Computed: versionName=$VERSION versionCode=$VERSION_CODE shouldRelease=$SHOULD_RELEASE"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platforms;android-35 build-tools;35.0.0 cmake;3.22.1 ndk;27.0.12077973"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Materialize keystore (if secrets present)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] \
             && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            cat > keystore.properties <<EOF
          storeFile=$(pwd)/release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
            echo "signing=true" >> "$GITHUB_OUTPUT"
            echo "Release signing enabled."
          else
            echo "signing=false" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets missing; release AAB will be unsigned."
          fi

      - name: Lint (debug)
        run: ./gradlew lintDebug --stacktrace --no-daemon
          -PversionName=${{ steps.version.outputs.version_name }}
          -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon
          -PversionName=${{ steps.version.outputs.version_name }}
          -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
          -PversionName=${{ steps.version.outputs.version_name }}
          -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Bundle release AAB
        run: ./gradlew bundleRelease --stacktrace --no-daemon
          -PversionName=${{ steps.version.outputs.version_name }}
          -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Assemble release APK (only when signing is configured)
        if: steps.keystore.outputs.signing == 'true'
        run: ./gradlew assembleRelease --stacktrace --no-daemon
          -PversionName=${{ steps.version.outputs.version_name }}
          -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: synth-piano-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: synth-piano-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK
        if: steps.keystore.outputs.signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: synth-piano-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup signing materials
        if: always()
        run: |
          rm -f release.keystore keystore.properties || true

  release:
    name: Tag and publish release
    if: needs.build.outputs.should_release == 'true'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout (for tagging)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: synth-piano-release-aab
          path: dist/

      - name: Download release APK (if present)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: synth-piano-release-apk
          path: dist/

      - name: Create and push tag (only on push to main, not on tag push)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v${{ needs.build.outputs.version_name }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping creation."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version_name }}
          name: v${{ needs.build.outputs.version_name }}
          files: dist/*
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
